    <style>
        :root {
            --bg-dark: #050507;
            --cyan-glow: rgba(6, 182, 212, 0.4);
            --cyan-active: rgba(6, 182, 212, 0.12);
            --smooth-curve: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            background-color: var(--bg-dark);
            color: #cbd5e1;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .font-shan { font-family: 'Ma Shan Zheng', cursive; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.2); border-radius: 10px; }

        nav { transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        nav.nav-hidden { transform: translateY(-100%); }

        .fixed-home {
            position: fixed; right: 20px; top: 20px; z-index: 200;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s var(--smooth-curve);
            display: flex; align-items: center; gap: 0.5rem;
            cursor: pointer;
        }
        @media (max-width: 640px) {
            .fixed-home { right: 12px; top: 10px; padding: 8px 14px !important; gap: 6px !important; border-radius: 10px !important; }
            .fixed-home span { font-size: 10px !important; }
            .fixed-home i { width: 16px !important; height: 16px !important; }
        }

        .list-card {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer; position: relative;
        }
        .list-card:active { transform: scale(0.97); transition: transform 0.1s ease; }

        .card-active {
            background: var(--cyan-active) !important;
            border-color: rgba(6, 182, 212, 0.5) !important;
            transform: translateX(8px) scale(1.02);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5), inset 0 0 15px rgba(6,182,212,0.1);
        }
        @media (max-width: 768px) {
            .card-active { transform: translateX(4px) scale(1.01); }
        }
        .card-active::before {
            content: ''; position: absolute; left: -10px; top: 20%; height: 60%; width: 3px;
            background: #06b6d4; border-radius: 0 4px 4px 0;
            box-shadow: 0 0 15px #06b6d4;
            animation: slideInLeft 0.3s var(--smooth-curve);
        }
        @media (max-width: 768px) {
            .card-active::before { left: -6px; width: 2px; }
        }
        @keyframes slideInLeft {
            from { transform: scaleY(0); opacity: 0; }
            to { transform: scaleY(1); opacity: 1; }
        }

        .filter-btn {
            transition: all 0.3s var(--smooth-curve);
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .filter-btn:active { transform: scale(0.92); transition: transform 0.1s ease; }
        .filter-btn.active {
            background: rgba(6, 182, 212, 0.2); border-color: rgba(6, 182, 212, 0.6); color: #06b6d4;
        }

        .filter-row-hidden {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.75s cubic-bezier(0.42, 0.0, 0.58, 1.0);
        }
        .filter-container:hover .filter-row-hidden,
        .filter-container.expanded .filter-row-hidden {
            max-height: 400px;
        }

        .glass-panel {
            background: rgba(255,255,255,0.02); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05);
        }

        .detail-fade-in {
            animation: detailReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes detailReveal {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .timeline-line {
            background: linear-gradient(to bottom, transparent, rgba(6,182,212,0.2) 10%, rgba(6,182,212,0.2) 90%, transparent);
            left: 24px;
        }
        @media (min-width: 768px) { .timeline-line { left: 50%; } }

        .timeline-item-active .timeline-card {
            background: rgba(6,182,212,0.08) !important;
            border-color: rgba(6,182,212,0.6) !important;
            box-shadow: 0 0 30px rgba(6,182,212,0.15);
            transform: scale(1.03);
        }
        @media (max-width: 768px) { .timeline-item-active .timeline-card { transform: scale(1.01); } }

        .timeline-item-active .timeline-dot {
            background: #06b6d4 !important;
            box-shadow: 0 0 0 4px rgba(6,182,212,0.2), 0 0 20px #06b6d4;
            border-color: #fff !important;
            transform: scale(1.4);
            animation: dotPulse 2.2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 0 4px rgba(6,182,212,0.2), 0 0 20px #06b6d4; }
            50% { box-shadow: 0 0 0 8px rgba(6,182,212,0.35), 0 0 35px #06b6d4; }
        }

        .timeline-card { 
            transition: all 0.4s var(--smooth-curve); 
            cursor: pointer; 
        }
        .timeline-card:active { transform: scale(0.97); transition: transform 0.1s ease; }
        .timeline-card:hover {
            box-shadow: 0 0 25px rgba(6,182,212,0.35);
            border-color: rgba(6,182,212,0.5);
            transform: scale(1.04);
        }
        .timeline-dot {
            transition: all 0.25s var(--smooth-curve);
            cursor: pointer;
        }
        .timeline-dot:hover {
            transform: scale(1.5);
            box-shadow: 0 0 0 6px rgba(6,182,212,0.3), 0 0 25px #06b6d4;
            border-color: #fff;
        }

        .dot-hover-glow {
            transform: scale(1.5);
            box-shadow: 0 0 0 6px rgba(6,182,212,0.3), 0 0 25px #06b6d4;
            border-color: #fff;
            animation: dotPulse 2.2s ease-in-out infinite;
        }

        .reveal {
            opacity: 0; transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform, opacity;
        }
        .reveal-left { transform: translateX(-40px); }
        .reveal-right { transform: translateX(40px); }
        .reveal.active { opacity: 1; transform: translateX(0); }
        @media (max-width: 768px) {
            .reveal-left { transform: translateX(-20px); }
            .reveal-right { transform: translateX(20px); }
            .reveal.active { transform: translateX(0); }
        }

        .special-glow {
            color: #22d3ee !important;
            filter: drop-shadow(0 0 3px rgba(34,211,238,0.5));
            border-color: rgba(34,211,238,0.35) !important;
            background: rgba(34,211,238,0.08) !important;
        }

        .log-bullet { display: inline-block; color: #06b6d4; margin-right: 0.5rem; text-shadow: 0 0 8px rgba(6,182,212,0.5); }
        .content-scroll { max-height: 55vh; overflow-y: auto; padding-right: 0.5rem; scroll-behavior: smooth; }
        @media (max-width: 768px) { 
            .content-scroll { max-height: 40vh; padding-right: 0.25rem; } 
            #card-list { max-height: 55vh; }  /* 手機版卡片列表高度增加 */
        }

        .log-category { margin-top: 1.5rem; }
        .log-category:first-child { margin-top: 0; }
        .log-category-title {
            font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700;
            color: #06b6d4; letter-spacing: 0.1em; text-transform: uppercase;
            margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .log-category-title::after {
            content: ''; flex-grow: 1; height: 1px;
            background: linear-gradient(to right, rgba(6,182,212,0.3), transparent);
        }
        .log-list { padding-left: 0.5rem; border-left: 1px solid rgba(255,255,255,0.05); }

        .perf-mini-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; font-family: 'JetBrains Mono', monospace; margin-top: 0.5rem; border-radius: 8px; overflow: hidden; }
        .perf-mini-table th { background: rgba(6,182,212,0.1); color: #06b6d4; padding: 10px 12px; text-align: left; font-weight: 700; letter-spacing: 0.04em; border-bottom: 1px solid rgba(6,182,212,0.3); font-size: 0.75rem; white-space: nowrap; }
        .perf-mini-table td { padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #cbd5e1; white-space: nowrap; font-size: 0.8rem; }
        .perf-mini-table .val-good { color: #3fb950; font-weight: 700; }
        .perf-mini-table .val-ok { color: #d4a853; font-weight: 600; }
        .perf-mini-table .val-bad { color: #f85149; font-weight: 600; }
        .perf-mini-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06); }

        .achievement-list { display: grid; grid-template-columns: 1fr; gap: 4px; }
        @media (min-width: 640px) { .achievement-list { grid-template-columns: 1fr 1fr; } }
        .achievement-item {
            display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px;
            font-size: 0.85rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
            color: #b0b8c4; line-height: 1.4;
        }
        .achievement-item i { flex-shrink: 0; width: 16px; height: 16px; color: #06b6d4; }

        .footer-module {
            padding: 5rem 1rem 4rem 1rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.03);
            background-color: var(--bg-dark); color: #ffffff; position: relative;
        }
        .footer-module .footer-brand { font-family: 'Ma Shan Zheng', cursive; font-size: 28px; margin-bottom: 1rem; opacity: 0.35; letter-spacing: 3px; }
        .footer-module .cyber-blue-text { color: #06b6d4; text-shadow: 0 0 10px rgba(6,182,212,0.3); }
        .footer-module .footer-text { font-size: 13px; line-height: 1.8; letter-spacing: 0.12em; max-width: 800px; margin: 0 auto; text-transform: uppercase; opacity: 0.6; }
        .footer-module .footer-legal { margin-top: 1.2rem; font-size: 10px; color: #64748b; letter-spacing: 0.05em; opacity: 0.5; max-width: 600px; margin-left: auto; margin-right: auto; }
        @media (max-width: 768px) {
            .footer-module .footer-brand { font-size: 22px; }
            .footer-module .footer-text { font-size: 11px; padding: 0 1rem; }
        }
    </style>
</head>

        let lastScrollTop = 0;

            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop && scrollTop > 60) navbar.classList.add('nav-hidden');
            else navbar.classList.remove('nav-hidden');
            lastScrollTop = scrollTop;

        function renderFilters() {
            const rows = [
                [{ label: '全部', icon: 'layout-grid' }],
                [
                    { label: '新增', icon: 'plus-circle' }, { label: '優化', icon: 'zap' },
                    { label: '修復', icon: 'wrench' }, { label: '更新', icon: 'refresh-cw' }

                ],
                [

                    { label: '鍛造', icon: 'hammer' }, { label: '金融', icon: 'landmark' }
                ]
            ];
            const container = document.getElementById('filter-container');
            container.innerHTML = rows.map((row, index) => {
                const rowClass = index === 0 ? '' : 'filter-row-hidden';
                const cols = row.length === 1 ? 'grid-cols-1' : 'grid-cols-4';
                return `<div class="grid ${cols} gap-1.5 md:gap-2 mb-2 ${rowClass}">
                    ${row.map(btn => `
                        <button onclick="setFilter('${btn.label}')" class="filter-btn flex flex-col items-center justify-center py-2 md:py-3 rounded-xl border ${filterType === btn.label ? 'active' : 'bg-white/5 border-white/10 text-slate-500 hover:border-white/20'}">
                            <i data-lucide="${btn.icon}" class="w-3.5 h-3.5 md:w-4 md:h-4 mb-1 md:mb-1.5"></i>
                            <span class="text-[8px] md:text-[9px] font-bold tracking-tighter">${btn.label}</span>
                        </button>
                    `).join('')}
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function matchesFilter(log) {
            if (filterType === '全部') return true;
            const map = { '醫療': '醫療', '鍛造': '鍛造', '金融': '銀行', '系統': ['系統', '銀行', '模組'] };
            if (map[filterType]) {
                const targets = Array.isArray(map[filterType]) ? map[filterType] : [map[filterType]];
                return log.tags.some(t => targets.includes(t));
            }
            return log.tags.some(tag => tag === filterType);
        }

        function renderCardList() {
            const filtered = changelogData.filter(log => matchesFilter(log) && (log.title.toLowerCase().includes(searchQuery.toLowerCase()) || log.date.includes(searchQuery)));

                let tagsHtml = '';
                if (tagCount <= 2) {
                    tagsHtml = `<div class="flex flex-col gap-1">${allTags.map(tag => renderTagIcon(tag, isActive)).join('')}</div>`;

                    tagsHtml = `

                        </div>`;
                } else {
                    tagsHtml = `<div class="grid grid-cols-2 gap-1">${allTags.slice(0,4).map(tag => renderTagIcon(tag, isActive)).join('')}</div>`;
                }

                return `
                <div onclick="setActive('${log.id}')" class="list-card p-4 md:p-5 rounded-2xl border relative group ${isActive ? 'card-active' : 'bg-white/[0.02] border-white/5 hover:border-white/10'}">
                    <div class="flex flex-col pr-14">
                        <span class="text-[9px] md:text-[10px] font-mono tracking-widest ${isActive ? 'text-cyan-400' : 'text-slate-600'} mb-1">${log.date}</span>
                        <span class="font-bold text-xs md:text-sm tracking-tight ${isActive ? 'text-white' : 'text-slate-400'} line-clamp-2">${log.title}</span>
                    </div>
                    <div class="absolute top-1/2 right-3 md:right-4 -translate-y-1/2">
                        ${tagsHtml}
                    </div>
                </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function renderTagIcon(tag, isActive) {
            const alwaysGlow = tagGlowCategories.includes(tag);
            const glowClass = alwaysGlow ? 'special-glow' : (isActive ? 'bg-cyan-500/20 border-cyan-400/40 text-cyan-400' : 'bg-white/5 border-white/10 text-slate-600');
            return `<div class="w-6 h-6 md:w-7 md:h-7 flex items-center justify-center rounded-md border transition-all duration-300 ${glowClass}">
                <i data-lucide="${tagIcons[tag] || 'hash'}" class="w-3.5 h-3.5 md:w-4 md:h-4"></i>
            </div>`;
        }

        function scrollToTimelineItem(id) {
            const target = document.getElementById(`timeline-item-${id}`);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function updateTimelineHighlight() {
            document.querySelectorAll('.time-tree-item').forEach(el => {
                if (el.dataset.id === activeId) {
                    el.classList.add('timeline-item-active');
                } else {
                    el.classList.remove('timeline-item-active');
                }
            });
        }

        function highlightDot(id) {
            const dot = document.getElementById(`dot-${id}`);
            if (dot) dot.classList.add('dot-hover-glow');
        }
        function unhighlightDot(id) {
            const dot = document.getElementById(`dot-${id}`);
            if (dot) dot.classList.remove('dot-hover-glow');
        }

        function renderDetail() {
            const data = changelogData.find(l => l.id === activeId);
            if (!data) return;
            document.getElementById('display-title-main').innerHTML = data.title;
            document.getElementById('display-year').innerText = data.date.split('-')[0];
            document.getElementById('detail-content').innerHTML = `
            <div class="detail-fade-in glass-panel p-6 md:p-10 rounded-[2rem] md:rounded-[2.5rem] relative shadow-2xl overflow-hidden border-cyan-500/10">
                <div class="absolute -bottom-10 -right-10 opacity-[0.03]"><i data-lucide="file-text" class="w-60 h-60 md:w-80 md:h-80"></i></div>
                <div class="relative z-10 space-y-4 md:space-y-6">
                    <div class="flex items-center gap-2 md:gap-4 flex-wrap">
                        ${data.tags.map(tag => {
                            const alwaysGlow = tagGlowCategories.includes(tag);
                            return `<span class="px-2 md:px-3 py-1 ${alwaysGlow ? 'special-glow border' : 'bg-cyan-500/10 border border-cyan-500/30 text-cyan-400'} text-[9px] md:text-[10px] font-bold rounded uppercase">${tag}</span>`;
                        }).join('')}
                        <span class="w-1 h-1 rounded-full bg-slate-700 hidden sm:block"></span>
                        <span class="text-slate-500 font-mono text-xs hidden sm:block">${data.date}</span>
                    </div>
                    <h2 class="text-2xl md:text-5xl font-black text-white tracking-tight leading-tight">${data.title}</h2>
                    <div class="h-px w-16 md:w-24 bg-cyan-500/50"></div>
                    <div class="content-scroll"><div class="text-slate-400 leading-relaxed font-light text-base md:text-xl">${data.content}</div></div>
                    <div class="pt-4 flex justify-end">
                        <button onclick="scrollToTimelineItem('${data.id}')" class="flex items-center gap-2 px-4 py-2 bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 rounded-xl hover:bg-cyan-500/20 transition-all text-sm font-bold">
                            <i data-lucide="clock" class="w-4 h-4"></i> 在時間軸中定位
                        </button>
                    </div>
                </div>
            </div>`;
            lucide.createIcons();
            updateTimelineHighlight();
        }

        function renderTimeTree() {
            const sortedData = [...changelogData].reverse();
            document.getElementById('time-tree-container').innerHTML = sortedData.map((log, index) => {
                const isEven = index % 2 === 0;
                const isActive = activeId === log.id;
                return `
                <div data-id="${log.id}" id="timeline-item-${log.id}" class="time-tree-item reveal ${isEven ? 'reveal-left' : 'reveal-right'} ${isActive ? 'timeline-item-active' : ''} flex items-center w-full relative" style="transition-delay: ${index * 0.04}s">
                    <div class="absolute left-[2px] md:left-1/2 md:-translate-x-1/2 flex items-center justify-center z-20">
                        <div id="dot-${log.id}" class="timeline-dot w-2.5 h-2.5 md:w-2 md:h-2 bg-slate-800 border-2 border-slate-700 rounded-full" onclick="event.stopPropagation(); setActive('${log.id}', { forceScroll: true })"></div>
                    </div>
                    <div class="w-full md:w-[45%] pl-8 md:pl-0 md:${isEven ? 'mr-auto md:pr-10' : 'ml-auto md:pl-10'}">
                        <div onclick="setActive('${log.id}', { skipDetail: true, skipScroll: true, skipTimelineRender: true })" 
                             onmouseenter="highlightDot('${log.id}')" 
                             onmouseleave="unhighlightDot('${log.id}')" 
                             class="timeline-card glass-panel p-4 md:p-6 rounded-2xl md:rounded-3xl border-white/5 relative group transition-all">
                            <div class="flex justify-between items-stretch gap-3 md:gap-4">
                                <div class="flex-grow min-w-0">
                                    <span class="text-cyan-500 font-mono text-[9px] md:text-[10px] font-bold block opacity-60 tracking-widest uppercase mb-1">${log.date}</span>
                                    <h3 class="text-base md:text-xl font-black text-white mb-1 md:mb-2 group-hover:text-cyan-400 transition-colors tracking-tight line-clamp-2">${log.title}</h3>
                                    <div class="text-slate-500 leading-relaxed text-[11px] md:text-xs max-w-[95%] font-light line-clamp-2">${log.content.replace(/<[^>]*>/g, ' ').substring(0, 100)}...</div>
                                </div>
                                <div class="flex flex-col gap-1.5 md:gap-2 shrink-0">
                                    ${log.tags.slice(0,3).map(tag => renderTagIcon(tag, isActive)).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
            lucide.createIcons();
            initObserver();
        }

        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    } else {
                        entry.target.classList.remove('active');
                    }
                });
            }, { threshold: 0.08, rootMargin: "0px 0px -8% 0px" });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        function setFilter(type) { 
            filterType = type; 
            renderFilters(); 
            renderCardList();
            // 手機版點擊過濾器按鈕後自動收起靈動島
            if (window.innerWidth <= 768) {
                const filterContainer = document.getElementById('filter-container');
                if (filterContainer) filterContainer.classList.remove('expanded');
            }
        }

        function setActive(id, options = {}) {
            if (activeId === id && !options.forceScroll) return;
            activeId = id;
            
            if (!options.skipDetail) {
                renderDetail();
            }
            if (!options.skipTimelineRender) {
                updateTimelineHighlight();
            }
            renderCardList();
            
            if (options.forceScroll) {
                document.getElementById('detail-scroll')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else if (!options.skipScroll && window.innerWidth < 768) {
                document.getElementById('detail-scroll')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        document.getElementById('search-input').addEventListener('input', (e) => { searchQuery = e.target.value; renderCardList(); });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('search-input').value = '';
                searchQuery = '';
                renderCardList();
                document.getElementById('search-input').blur();
            }
        });

        window.onload = () => { 
            renderFilters(); 
            renderCardList(); 
            renderDetail(); 
            renderTimeTree();
            
            // 手機版過濾器點擊展開/收起
            const filterContainer = document.getElementById('filter-container');
            if (filterContainer) {
                filterContainer.addEventListener('click', function(e) {
                    if (window.innerWidth <= 768) {
                        if (!e.target.closest('.filter-btn')) {
                            this.classList.toggle('expanded');
                        }
                    }
                });
            }
        };
    </script>
</body>
</html>
